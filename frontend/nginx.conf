server {
    listen 80;

    # Serve React SPA — all unknown routes return index.html
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API calls → backend container
    # Frontend calls /api/chat, nginx strips /api and forwards to backend:8000/chat
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Proxy WebSocket connections → backend container
    # Frontend connects to /ws/chat, nginx forwards to backend:8000/ws/chat
    location /ws/ {
        proxy_pass             http://backend:8000/ws/;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }
}
