## Step 4: Add a `.gitignore` entry for the model

Your model is 1.12GB — **never push it to git.** Add this to your `.gitignore` at the project root:
```
# Model files
models/
*.gguf

# Python
backend/venv/
__pycache__/
*.pyc
.env