version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app        # live code — backend/app/ → /app/app
      - ./models:/app/models          # models/ → /app/models inside container
    environment:
      - MODEL_PATH=/app/models/qwen2.5-3b-instruct-q4_k_m.gguf
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    restart: unless-stopped